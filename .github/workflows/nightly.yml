name: Nightly Compatibility Check

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  check-and-run:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Check for updates
        id: check_updates
        run: |
          if npm run version:check; then
            echo "updates_found=false" >> "$GITHUB_OUTPUT"
          else
            echo "updates_found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run pipeline
        if: steps.check_updates.outputs.updates_found == 'true'
        run: npm run test:pipeline

      - name: Create Pull Request
        if: steps.check_updates.outputs.updates_found == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: update compatibility versions in README.md"
          title: "Nightly Compatibility Updates"
          body: "Automated nightly updates for compatibility versions."
          branch: nightly-updates
          base: main

      - name: Enable Auto-Merge
        if: steps.cpr.outputs.pull-request-operation == 'created'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}"
